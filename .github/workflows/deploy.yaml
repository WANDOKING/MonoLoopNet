name: Deploy to NuGet

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment: release

    permissions:
      # 배포 후 커밋에 태그를 푸시하기 위해 필요합니다.
      contents: write
      # NuGet Trusted Publishing(OIDC)을 위해 필요합니다.
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build

      - name: Pack (Release)
        run: dotnet pack src/MonoLoop.Server/MonoLoop.Server.csproj --configuration Release --no-build --output ${{ github.workspace }}/artifacts

      - name: NuGet login (Trusted Publishing)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        run: >
          dotnet nuget push "${{ github.workspace }}/artifacts/*.nupkg"
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Read package version
        id: version
        run: |
          VERSION=$(grep -oPm1 '(?<=<Version>)[^<]+' src/MonoLoop.Server/MonoLoop.Server.csproj)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Tag the commit
        env:
          TAG: v${{ steps.version.outputs.version }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists. Skipping."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
